version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: mayaguard-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: mayaguard-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU passthrough - comment out if no NVIDIA runtime
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # -- vLLM (optional - high-throughput GPU serving) ---------------------
  # Uncomment below to deploy vLLM as the primary LLM inference backend.
  # Requires: Linux host + NVIDIA GPU with sufficient VRAM (16GB+ recommended).
  # After starting, set VLLM_ENABLED=true in your .env file.
  #
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: mayaguard-vllm
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - MODEL_NAME=mistralai/Mistral-7B-Instruct-v0.2
  #     - MAX_MODEL_LEN=4096
  #   command: >
  #     --model mistralai/Mistral-7B-Instruct-v0.2
  #     --max-model-len 4096
  #     --dtype float16
  #     --gpu-memory-utilization 0.85
  #   volumes:
  #     - vllm_cache:/root/.cache/huggingface
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mayaguard-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      # Uncomment below when using vLLM
      # - VLLM_ENABLED=true
      # - VLLM_BASE_URL=http://vllm:8000
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: mayaguard-dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_data:
  ollama_models:
  # vllm_cache:
